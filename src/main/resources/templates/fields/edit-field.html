<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>J Arena Admin – Edit Field</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f8f9fa; margin: 0; font-family: 'Segoe UI', sans-serif; }
    </style>
</head>
<body>

<div class="min-vh-100 d-flex align-items-center justify-content-center p-3">
    <div class="card border-0 shadow-sm" style="width:100%;max-width:520px;">
        <div class="card-header bg-white border-bottom py-3">
            <h5 class="mb-0 fw-bold">
                <i class="bi bi-pencil-square text-success me-2"></i>Edit Field
            </h5>
        </div>
        <div class="card-body p-4">

            <!-- Error alert -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${error}">Error</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/admin/fields/edit/{id}(id=${field.id})}" th:object="${field}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold small">Field Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}"
                           placeholder="e.g. Field A" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small">Location</label>
                    <input type="text" class="form-control" th:field="*{location}"
                           placeholder="e.g. Block B, Ground Floor"/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small">Price Per Hour (RM) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" th:field="*{pricePerHour}"
                           min="0.01" step="0.01" placeholder="e.g. 80.00" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small">Image URL</label>
                    <input type="url" class="form-control" th:field="*{imageUrl}"
                           placeholder="https://example.com/field.jpg"/>
                </div>

                <div class="mb-4">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch"
                               th:field="*{available}" id="availableSwitch"/>
                        <label class="form-check-label fw-semibold small" for="availableSwitch">
                            Available for booking
                        </label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success fw-semibold flex-grow-1">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                    <a th:href="@{/admin/fields}" class="btn btn-outline-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
