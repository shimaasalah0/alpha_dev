<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg" style="background-color: #16a34a;">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold text-white fs-4" href="#">
            <span style="font-size:1.3rem;">&#9917;</span> J Arena
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white fw-semibold" th:if="${session.loggedInUser != null}">
                <i class="bi bi-person-circle me-1"></i>
                <span th:text="${session.loggedInUser.fullName}">User</span>
            </span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm px-3">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>
</body>
</html>
