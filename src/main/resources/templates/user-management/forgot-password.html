<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>J Arena – Forgot Password</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body {
            background-color: #f0fdf4;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .page-wrapper {
            max-width: 480px;
            margin: 0 auto;
        }
        .icon-box {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
        }
        .auth-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(22,163,74,0.12);
            width: 100%;
            padding: 2rem 2rem;
        }
        .lock-icon-wrap {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #16a34a;
            margin: 0 auto 1.25rem;
        }
        .btn-green { background-color: #16a34a; color: #fff; border: none; }
        .btn-green:hover { background-color: #15803d; color: #fff; }
        .form-control:focus { border-color: #16a34a; box-shadow: 0 0 0 0.2rem rgba(22,163,74,0.2); }
        .back-link { color: #16a34a; text-decoration: none; font-weight: 600; }
        .back-link:hover { color: #15803d; }
    </style>
</head>
<body>
<div class="page-wrapper">

    <!-- Title -->
    <div class="text-center mb-4">
        <div class="icon-box mx-auto mb-2">&#9917;</div>
        <h3 class="fw-bold mb-0" style="color:#15803d;">J Arena</h3>
        <p class="text-muted small mb-0">Football Field Booking System</p>
    </div>

    <!-- Card -->
    <div class="auth-card mx-auto">

        <div class="lock-icon-wrap">
            <i class="bi bi-shield-lock"></i>
        </div>

        <h5 class="fw-bold text-center mb-1" style="color:#15803d;">Forgot Password?</h5>
        <p class="text-muted text-center small mb-4">
            Enter your registered email address and we'll let you reset your password.
        </p>

        <!-- Error alert -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible py-2 small" role="alert">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
        </div>

        <!-- Form -->
        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-4">
                <label for="email" class="form-label fw-semibold small">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="you@example.com" required autofocus/>
                </div>
            </div>
            <button type="submit" class="btn btn-green w-100 fw-semibold py-2 mb-3">
                <i class="bi bi-arrow-right-circle me-2"></i>Continue
            </button>
        </form>

        <p class="text-center mb-0">
            <a th:href="@{/login}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i>Back to Sign In
            </a>
        </p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
